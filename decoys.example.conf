# ==========================================================================
#  INF_Purple FortiDeceptor PoC - Decoy config template
# ==========================================================================
#  Format (spacing does not matter):   name | ip1,ip2,... | modules(optional)
#
#  - If the modules column is EMPTY, they are derived from the decoy NAME.
#  - Lines starting with # are comments.
#  - recon + portscan are added to every decoy automatically, no need to list.
#
#  Usage:  ./fd_poc_runner.sh --config decoys.conf
#          ./fd_poc_runner.sh --config decoys.conf --list   (see the plan first)
#
#  NOTE: These are PLACEHOLDER IPs. Copy this file to 'decoys.conf' and fill in
#        your own decoy IPs (decoys.conf is git-ignored so customer data is
#        never committed). Easiest of all: skip the config and just point the
#        runner at a FortiDeceptor "Decoy Status" CSV export:
#            ./fd_poc_runner.sh --csv decoy_status.csv
# ==========================================================================

